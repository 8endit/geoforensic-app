  <path d="M 100 380 Q 250 350 400 290 T 620 240" fill="none" stroke="#5DCAA5" stroke-width="0.5" opacity="0.5"/>

  <!-- 500m-Radius -->
  <circle cx="340" cy="240" r="120" fill="none" stroke="#185FA5" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <text x="340" y="135" text-anchor="middle" font-size="12" fill="#185FA5">500 m Radius</text>

