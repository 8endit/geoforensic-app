<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="480" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>GeoForensic Grundstück-im-Kontext-Karte</title>
  <desc>Schemakarte mit 500m-Radius, PSI-Punkten farbcodiert nach Velocity, und Hausumriss in der Mitte.</desc>

  <text x="40" y="35" font-size="14" font-weight="500" fill="#2C2C2A">Ihr Grundstück und seine Umgebung</text>
  <text x="40" y="53" font-size="12" fill="#5F5E5A">47 PSI-Punkte im 500m-Radius · Farbe = Velocity</text>

  <!-- Kartenfläche -->
  <rect x="40" y="80" width="600" height="320" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>

  <!-- Hilfsraster -->
  <line x1="40" y1="160" x2="640" y2="160" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="40" y1="240" x2="640" y2="240" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="40" y1="320" x2="640" y2="320" stroke="#D3D1C7" stroke-width="0.5"/>
