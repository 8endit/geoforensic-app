  <line x1="280" y1="80" x2="280" y2="400" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="400" y1="80" x2="400" y2="400" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="520" y1="80" x2="520" y2="400" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- Andeutung von Straßen / Geländelinien -->
