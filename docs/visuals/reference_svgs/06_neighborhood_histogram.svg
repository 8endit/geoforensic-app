<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="280" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>GeoForensic Nachbarschafts-Vergleich</title>
  <desc>Histogramm der Velocity-Verteilung im 500m-Radius mit Markierung des eigenen Grundstücks.</desc>

  <text x="40" y="35" font-size="14" font-weight="500" fill="#2C2C2A">Wo steht Ihr Grundstück in der Umgebung?</text>
  <text x="40" y="53" font-size="12" fill="#5F5E5A">Velocity-Verteilung aller PSI-Punkte im 500m-Radius</text>

  <!-- X-Achse -->
  <line x1="60" y1="220" x2="640" y2="220" stroke="#888780" stroke-width="0.5"/>

  <!-- Histogramm-Säulen, von links (-5 mm/J) bis rechts (+5 mm/J) -->
  <rect x="80" y="200" width="22" height="20" fill="#9FE1CB"/>
  <rect x="105" y="190" width="22" height="30" fill="#9FE1CB"/>
  <rect x="130" y="175" width="22" height="45" fill="#5DCAA5"/>
  <rect x="155" y="155" width="22" height="65" fill="#5DCAA5"/>
  <rect x="180" y="135" width="22" height="85" fill="#1D9E75"/>
  <rect x="205" y="120" width="22" height="100" fill="#1D9E75"/>
  <rect x="230" y="110" width="22" height="110" fill="#1D9E75"/>
  <rect x="255" y="105" width="22" height="115" fill="#1D9E75"/>
  <rect x="280" y="100" width="22" height="120" fill="#1D9E75"/>
  <rect x="305" y="105" width="22" height="115" fill="#1D9E75"/>
  <rect x="330" y="115" width="22" height="105" fill="#1D9E75"/>
  <rect x="355" y="125" width="22" height="95" fill="#1D9E75"/>
  <rect x="380" y="140" width="22" height="80" fill="#5DCAA5"/>
  <rect x="405" y="160" width="22" height="60" fill="#5DCAA5"/>
  <rect x="430" y="175" width="22" height="45" fill="#9FE1CB"/>
  <rect x="455" y="190" width="22" height="30" fill="#9FE1CB"/>
  <rect x="480" y="200" width="22" height="20" fill="#9FE1CB"/>
  <rect x="505" y="208" width="22" height="12" fill="#FAC775"/>
  <rect x="530" y="212" width="22" height="8" fill="#FAC775"/>
  <rect x="555" y="215" width="22" height="5" fill="#EF9F27"/>
  <rect x="580" y="217" width="22" height="3" fill="#EF9F27"/>

  <!-- Marker für eigenes Grundstück -->
  <line x1="402" y1="80" x2="402" y2="225" stroke="#185FA5" stroke-width="2" stroke-dasharray="4 3"/>
  <rect x="340" y="65" width="125" height="22" rx="4" fill="#185FA5"/>
  <text x="402" y="80" text-anchor="middle" font-size="14" font-weight="500" fill="#FFFFFF">Ihr Grundstück</text>

  <!-- X-Achsen-Labels -->
  <text x="91" y="240" font-size="12" fill="#5F5E5A">−5</text>
  <text x="216" y="240" font-size="12" fill="#5F5E5A">−2.5</text>
  <text x="291" y="240" font-size="12" fill="#5F5E5A">0</text>
  <text x="402" y="240" font-size="12" font-weight="500" fill="#185FA5">−1.4</text>
  <text x="491" y="240" font-size="12" fill="#5F5E5A">+2.5</text>
  <text x="591" y="240" font-size="12" fill="#5F5E5A">+5</text>

  <!-- Footer -->
  <text x="350" y="262" text-anchor="middle" font-size="12" fill="#5F5E5A">Velocity in mm/Jahr · 47 PSI-Punkte ausgewertet</text>
  <text x="350" y="278" text-anchor="middle" font-size="12" fill="#5F5E5A">Im unauffälligen Mittelbereich der Nachbarschaft</text>
</svg>
