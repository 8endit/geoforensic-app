<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="260" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>GeoForensic Risiko-Dashboard</title>
  <desc>Erste Seite des Berichts. Burland-Klasse links, Detailwerte mittig, Schufa-Note rechts.</desc>

  <!-- Linker Block: Burland-Klasse -->
  <rect x="20" y="20" width="180" height="220" rx="12" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="110" y="48" text-anchor="middle" font-size="12" fill="#854F0B">Burland-Klasse</text>
  <text x="110" y="135" text-anchor="middle" font-size="64" font-weight="500" fill="#854F0B">2</text>
  <text x="110" y="170" text-anchor="middle" font-size="14" font-weight="500" fill="#854F0B">leicht</text>
  <text x="110" y="195" text-anchor="middle" font-size="12" fill="#854F0B">0–5 mm Setzung</text>
  <text x="110" y="215" text-anchor="middle" font-size="12" fill="#854F0B">über 5 Jahre</text>

  <!-- Mitte: 4 Detailbox-Stack -->
  <rect x="215" y="20" width="220" height="50" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="228" y="40" font-size="12" fill="#5F5E5A">Velocity</text>
  <text x="422" y="50" text-anchor="end" font-size="14" font-weight="500" fill="#2C2C2A">−1.4 mm/Jahr</text>
  <text x="228" y="60" font-size="12" fill="#5F5E5A">Mittel der drei nächsten PSI</text>

  <rect x="215" y="80" width="220" height="50" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="228" y="100" font-size="12" fill="#5F5E5A">Trend 2020–2024</text>
  <text x="422" y="110" text-anchor="end" font-size="14" font-weight="500" fill="#2C2C2A">stabil</text>
  <text x="228" y="120" font-size="12" fill="#5F5E5A">leichte saisonale Schwankung</text>

  <rect x="215" y="140" width="220" height="50" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="228" y="160" font-size="12" fill="#5F5E5A">Datenqualität</text>
  <text x="422" y="170" text-anchor="end" font-size="14" font-weight="500" fill="#2C2C2A">hoch</text>
  <text x="228" y="180" font-size="12" fill="#5F5E5A">Kohärenz 0.84</text>

  <rect x="215" y="200" width="220" height="40" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="228" y="218" font-size="12" fill="#5F5E5A">PSI-Punkte im 500m-Radius</text>
  <text x="422" y="230" text-anchor="end" font-size="14" font-weight="500" fill="#2C2C2A">47</text>

  <!-- Rechter Block: Schufa-Note -->
  <rect x="450" y="20" width="210" height="220" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="555" y="48" text-anchor="middle" font-size="12" fill="#04342C">Gesamtbewertung</text>
  <circle cx="555" cy="130" r="52" fill="#1D9E75"/>
  <text x="555" y="146" text-anchor="middle" font-size="52" font-weight="500" fill="#FFFFFF">A</text>
  <text x="555" y="205" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">unauffällig</text>
  <text x="555" y="225" text-anchor="middle" font-size="12" fill="#04342C">Routinebeobachtung</text>
</svg>
