<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>GeoForensic Velocity-Zeitreihe mit Niederschlag</title>
  <desc>InSAR-Bewegungsverlauf über 5 Jahre, überlagert mit Niederschlagssäulen, mit Trendlinie.</desc>

  <text x="40" y="35" font-size="14" font-weight="500" fill="#2C2C2A">Bewegungsverlauf · 2020 bis 2024</text>
  <text x="40" y="53" font-size="12" fill="#5F5E5A">Negative Werte = Setzung · Säulen = monatlicher Niederschlag</text>

  <!-- Achsen -->
  <line x1="80" y1="80" x2="80" y2="240" stroke="#888780" stroke-width="0.5"/>
  <line x1="80" y1="240" x2="640" y2="240" stroke="#888780" stroke-width="0.5"/>

  <!-- Y-Achsen-Labels -->
  <text x="74" y="86" text-anchor="end" font-size="12" fill="#5F5E5A">+5</text>
  <text x="74" y="124" text-anchor="end" font-size="12" fill="#5F5E5A">0</text>
  <text x="74" y="162" text-anchor="end" font-size="12" fill="#5F5E5A">−5</text>
  <text x="74" y="200" text-anchor="end" font-size="12" fill="#5F5E5A">−10</text>
  <text x="74" y="238" text-anchor="end" font-size="12" fill="#5F5E5A">−15</text>
  <text x="40" y="160" text-anchor="middle" font-size="12" fill="#5F5E5A">mm</text>

  <!-- Null-Linie -->
  <line x1="80" y1="124" x2="640" y2="124" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- Niederschlagssäulen (Hintergrund) -->
  <rect x="100" y="195" width="20" height="45" fill="#B5D4F4" opacity="0.6"/>
  <rect x="155" y="200" width="20" height="40" fill="#B5D4F4" opacity="0.6"/>
  <rect x="210" y="180" width="20" height="60" fill="#B5D4F4" opacity="0.6"/>
  <rect x="265" y="210" width="20" height="30" fill="#B5D4F4" opacity="0.6"/>
  <rect x="320" y="170" width="20" height="70" fill="#B5D4F4" opacity="0.6"/>
  <rect x="375" y="220" width="20" height="20" fill="#B5D4F4" opacity="0.6"/>
  <rect x="430" y="190" width="20" height="50" fill="#B5D4F4" opacity="0.6"/>
  <rect x="485" y="175" width="20" height="65" fill="#B5D4F4" opacity="0.6"/>
  <rect x="540" y="205" width="20" height="35" fill="#B5D4F4" opacity="0.6"/>
  <rect x="595" y="195" width="20" height="45" fill="#B5D4F4" opacity="0.6"/>

  <!-- PSI-Linie -->
  <path d="M100 130 L155 138 L210 122 L265 145 L320 118 L375 152 L430 132 L485 115 L540 148 L595 138" fill="none" stroke="#534AB7" stroke-width="2"/>

  <!-- Datenpunkte -->
  <circle cx="100" cy="130" r="3" fill="#534AB7"/>
  <circle cx="155" cy="138" r="3" fill="#534AB7"/>
  <circle cx="210" cy="122" r="3" fill="#534AB7"/>
  <circle cx="265" cy="145" r="3" fill="#534AB7"/>
  <circle cx="320" cy="118" r="3" fill="#534AB7"/>
  <circle cx="375" cy="152" r="3" fill="#534AB7"/>
  <circle cx="430" cy="132" r="3" fill="#534AB7"/>
  <circle cx="485" cy="115" r="3" fill="#534AB7"/>
  <circle cx="540" cy="148" r="3" fill="#534AB7"/>
  <circle cx="595" cy="138" r="3" fill="#534AB7"/>

  <!-- Trendlinie -->
  <line x1="80" y1="135" x2="640" y2="142" stroke="#A32D2D" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="600" y="155" font-size="12" fill="#A32D2D">Trend −1.4 mm/J</text>

  <!-- X-Achsen-Labels -->
  <text x="110" y="258" text-anchor="middle" font-size="12" fill="#5F5E5A">2020</text>
  <text x="220" y="258" text-anchor="middle" font-size="12" fill="#5F5E5A">2021</text>
  <text x="330" y="258" text-anchor="middle" font-size="12" fill="#5F5E5A">2022</text>
  <text x="440" y="258" text-anchor="middle" font-size="12" fill="#5F5E5A">2023</text>
  <text x="550" y="258" text-anchor="middle" font-size="12" fill="#5F5E5A">2024</text>

  <!-- Legende -->
  <rect x="80" y="280" width="12" height="10" fill="#534AB7"/>
  <text x="98" y="289" font-size="12" fill="#5F5E5A">Setzung (PSI-Mittel)</text>
  <rect x="220" y="280" width="12" height="10" fill="#B5D4F4" opacity="0.6"/>
  <text x="238" y="289" font-size="12" fill="#5F5E5A">Niederschlag (DWD)</text>
  <line x1="370" y1="285" x2="390" y2="285" stroke="#A32D2D" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="395" y="289" font-size="12" fill="#A32D2D">Trendlinie</text>
</svg>
