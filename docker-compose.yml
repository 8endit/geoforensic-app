services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: geoforensic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - geoforensic-db:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/geoforensic
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    image: node:20
    working_dir: /app
    command: sh -lc "corepack enable && pnpm install && pnpm dev --host 0.0.0.0 --port 3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend/geoforensic_webcode:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  geoforensic-db:

