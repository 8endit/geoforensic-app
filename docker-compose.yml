services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geoforensic}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - geoforensic-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10
    restart: on-failure

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-geoforensic}
      RASTER_DIR: /app/rasters
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Sentry — leer = no-op; DSN kommt aus der Repo-Root .env
      # (NICHT backend/.env — docker-compose substituiert ${SENTRY_DSN}
      # aus seiner eigenen .env im CWD, also Repo-Root). Siehe .env.example.
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    ports:
      - "8000:8000"
    volumes:
      - ./landing:/app/landing:ro
      # shared/ liegt im Repo-Root, ist aber ausserhalb des backend-Build-
      # Contexts — visual_renderer.py erwartet die Tokens unter
      # /shared/visual_tokens.json (parents[1] vom backend-Code aus).
      # Bind-Mount statt COPY weil shared zwischen Backend + Frontend +
      # Cozy geteilt wird und nicht per-Image gebunden sein soll.
      - ./shared:/shared:ro
      # Rasters: rw weil Pull-Scripts (scripts/download_kostra.py etc.)
      # neue Datasets per ZIP/HTTP einspielen + per rasterio konvertieren.
      # Backend-API selbst hat keinen Code-Pfad der schreibt; lesender
      # Standard-Betrieb bleibt unverändert.
      - ${RASTER_DIR:-./rasters}:/app/rasters:rw
    # Run pending Alembic migrations before uvicorn boots. The migrations
    # themselves are idempotent (IF NOT EXISTS / DO blocks), so a no-op
    # upgrade when the DB is already at head is instant. Without this
    # line the operator has to remember to `docker compose exec backend
    # alembic upgrade head` after every deploy, which is exactly the
    # failure mode we just hit with the 2026-04-24 reports.lead_id patch.
    # --workers 4: vier eigenständige Python-Prozesse parallel. Single
    # Worker = einziger Crash killt ALLE laufenden Pipelines + alle
    # asyncio-Tasks teilen einen ThreadPool. Mit 4 Workern × Chrome-
    # Semaphore(2) = max 8 PDFs parallel bei ~600 MB RAM = 4,8 GB,
    # passt in 12 GB VPS-RAM mit Headroom für DB/OS/Redis. CPU-Cores
    # sind 6, leichte Oversubscription ist OK weil PDFs primär
    # I/O- und subprocess-bound sind.
    command: >
      sh -c "alembic upgrade head &&
             exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

volumes:
  geoforensic-db:
