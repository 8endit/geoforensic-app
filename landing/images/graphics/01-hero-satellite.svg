<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="Satellit ueber Wohnsiedlung — Sentinel-1 InSAR Screening">
  <defs>
    <linearGradient id="scanBeam" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#22C55E" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bodyShade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F3F4F6"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Sparse star field for atmosphere -->
  <g fill="#FFFFFF">
    <circle cx="55" cy="38" r="1" opacity="0.7"/>
    <circle cx="112" cy="72" r="0.8" opacity="0.5"/>
    <circle cx="215" cy="45" r="0.9" opacity="0.6"/>
    <circle cx="310" cy="28" r="1" opacity="0.8"/>
    <circle cx="525" cy="52" r="0.8" opacity="0.55"/>
    <circle cx="588" cy="32" r="1" opacity="0.7"/>
    <circle cx="462" cy="68" r="0.7" opacity="0.45"/>
    <circle cx="168" cy="90" r="0.6" opacity="0.4"/>
  </g>

  <!-- Horizon / curvature hint -->
  <path d="M 0 290 Q 320 270 640 290 L 640 360 L 0 360 Z" fill="rgba(255,255,255,0.02)"/>

  <!-- Topographic contour lines on ground (replaces hard grid) -->
  <g stroke="rgba(255,255,255,0.12)" stroke-width="0.8" fill="none">
    <path d="M 0 310 Q 160 302 320 308 Q 480 314 640 306"/>
    <path d="M 0 322 Q 160 316 320 320 Q 480 324 640 318"/>
    <path d="M 0 334 Q 160 330 320 332 Q 480 334 640 330"/>
  </g>
  <g stroke="rgba(34,197,94,0.15)" stroke-width="0.8" fill="none">
    <path d="M 0 298 Q 160 290 320 296 Q 480 302 640 294"/>
  </g>

  <!-- Property-boundary dotted polygon around center cluster -->
  <path d="M 258 262 L 382 258 L 390 296 L 252 300 Z"
        fill="none" stroke="#22C55E" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.65"/>

  <!-- Architectural silhouettes (varied: detached, semi, apartment) -->
  <g stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-linejoin="round" fill="rgba(255,255,255,0.15)">
    <!-- detached house left -->
    <path d="M 92 294 L 92 260 L 124 240 L 156 260 L 156 294 Z"/>
    <rect x="110" y="268" width="10" height="26" fill="rgba(255,255,255,0.35)"/>
    <rect x="130" y="266" width="12" height="10" fill="rgba(255,255,255,0.35)"/>
    <!-- detached house center (our "target") -->
    <path d="M 280 294 L 280 252 L 320 226 L 360 252 L 360 294 Z"/>
    <rect x="304" y="264" width="14" height="30" fill="rgba(255,255,255,0.4)"/>
    <rect x="328" y="262" width="16" height="12" fill="rgba(255,255,255,0.4)"/>
    <!-- semi / apartment block right -->
    <rect x="460" y="246" width="96" height="48" rx="1.5"/>
    <path d="M 460 246 L 460 234 L 556 234 L 556 246 Z"/>
    <rect x="470" y="254" width="10" height="14" fill="rgba(255,255,255,0.35)"/>
    <rect x="488" y="254" width="10" height="14" fill="rgba(255,255,255,0.35)"/>
    <rect x="506" y="254" width="10" height="14" fill="rgba(255,255,255,0.35)"/>
    <rect x="524" y="254" width="10" height="14" fill="rgba(255,255,255,0.35)"/>
    <rect x="540" y="254" width="10" height="14" fill="rgba(255,255,255,0.35)"/>
    <rect x="470" y="272" width="10" height="14" fill="rgba(255,255,255,0.35)"/>
    <rect x="488" y="272" width="10" height="14" fill="rgba(255,255,255,0.35)"/>
    <rect x="506" y="272" width="10" height="14" fill="rgba(255,255,255,0.35)"/>
    <rect x="524" y="272" width="10" height="14" fill="rgba(255,255,255,0.35)"/>
    <rect x="540" y="272" width="10" height="14" fill="rgba(255,255,255,0.35)"/>
  </g>

  <!-- Trees / vegetation dots -->
  <g fill="rgba(34,197,94,0.4)">
    <circle cx="200" cy="286" r="5"/>
    <circle cx="210" cy="290" r="4"/>
    <circle cx="416" cy="286" r="5"/>
    <circle cx="426" cy="290" r="4"/>
    <circle cx="58" cy="290" r="4"/>
  </g>

  <!-- InSAR measurement dots, muted palette with soft glow -->
  <g>
    <!-- stable (forest green) -->
    <circle cx="80" cy="310" r="10" fill="url(#dotGlow)"/>
    <circle cx="80" cy="310" r="3" fill="#4ADE80" stroke="#052e16" stroke-width="0.6"/>
    <circle cx="140" cy="312" r="10" fill="url(#dotGlow)"/>
    <circle cx="140" cy="312" r="3" fill="#4ADE80" stroke="#052e16" stroke-width="0.6"/>
    <circle cx="230" cy="310" r="10" fill="url(#dotGlow)"/>
    <circle cx="230" cy="310" r="3" fill="#4ADE80" stroke="#052e16" stroke-width="0.6"/>
    <circle cx="290" cy="312" r="10" fill="url(#dotGlow)"/>
    <circle cx="290" cy="312" r="3" fill="#4ADE80" stroke="#052e16" stroke-width="0.6"/>
    <circle cx="360" cy="310" r="10" fill="url(#dotGlow)"/>
    <circle cx="360" cy="310" r="3" fill="#4ADE80" stroke="#052e16" stroke-width="0.6"/>
    <circle cx="440" cy="312" r="10" fill="url(#dotGlow)"/>
    <circle cx="440" cy="312" r="3" fill="#4ADE80" stroke="#052e16" stroke-width="0.6"/>
    <circle cx="570" cy="310" r="10" fill="url(#dotGlow)"/>
    <circle cx="570" cy="310" r="3" fill="#4ADE80" stroke="#052e16" stroke-width="0.6"/>
    <circle cx="40" cy="326" r="2.5" fill="#4ADE80" opacity="0.75"/>
    <circle cx="180" cy="326" r="2.5" fill="#4ADE80" opacity="0.75"/>
    <circle cx="260" cy="326" r="2.5" fill="#4ADE80" opacity="0.75"/>
    <circle cx="400" cy="326" r="2.5" fill="#4ADE80" opacity="0.75"/>
    <circle cx="500" cy="326" r="2.5" fill="#4ADE80" opacity="0.75"/>
    <!-- one amber (watch) -->
    <circle cx="320" cy="326" r="2.5" fill="#D97706" opacity="0.85"/>
    <circle cx="610" cy="324" r="2.5" fill="#D97706" opacity="0.85"/>
  </g>

  <!-- Scan beam -->
  <path d="M 470 88 L 410 258 L 530 258 Z" fill="url(#scanBeam)"/>
  <line x1="470" y1="88" x2="410" y2="258" stroke="#22C55E" stroke-width="1" stroke-dasharray="4 3" opacity="0.65"/>
  <line x1="470" y1="88" x2="530" y2="258" stroke="#22C55E" stroke-width="1" stroke-dasharray="4 3" opacity="0.65"/>

  <!-- Ping ripples on scan target -->
  <ellipse cx="470" cy="250" rx="58" ry="5" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.3"/>
  <ellipse cx="470" cy="250" rx="38" ry="3.5" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.55"/>
  <ellipse cx="470" cy="250" rx="18" ry="2" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.8"/>

  <!-- Satellite (Sentinel-1-inspired) -->
  <g transform="translate(470, 72)">
    <!-- solar panel left -->
    <g transform="translate(-60, 0)">
      <rect x="0" y="-5" width="42" height="14" fill="#1F2937" stroke="#22C55E" stroke-width="1.2"/>
      <line x1="10" y1="-5" x2="10" y2="9" stroke="#22C55E" stroke-width="0.7"/>
      <line x1="20" y1="-5" x2="20" y2="9" stroke="#22C55E" stroke-width="0.7"/>
      <line x1="30" y1="-5" x2="30" y2="9" stroke="#22C55E" stroke-width="0.7"/>
      <line x1="0" y1="2" x2="42" y2="2" stroke="#22C55E" stroke-width="0.5" opacity="0.5"/>
    </g>
    <!-- arm -->
    <line x1="-18" y1="0" x2="-11" y2="0" stroke="#E5E7EB" stroke-width="1.6"/>
    <!-- solar panel right -->
    <g transform="translate(18, 0)">
      <rect x="0" y="-5" width="42" height="14" fill="#1F2937" stroke="#22C55E" stroke-width="1.2"/>
      <line x1="10" y1="-5" x2="10" y2="9" stroke="#22C55E" stroke-width="0.7"/>
      <line x1="20" y1="-5" x2="20" y2="9" stroke="#22C55E" stroke-width="0.7"/>
      <line x1="30" y1="-5" x2="30" y2="9" stroke="#22C55E" stroke-width="0.7"/>
      <line x1="0" y1="2" x2="42" y2="2" stroke="#22C55E" stroke-width="0.5" opacity="0.5"/>
    </g>
    <line x1="11" y1="0" x2="18" y2="0" stroke="#E5E7EB" stroke-width="1.6"/>
    <!-- body -->
    <rect x="-14" y="-10" width="28" height="22" rx="2" fill="url(#bodyShade)" stroke="#E5E7EB" stroke-width="1.5"/>
    <rect x="-9" y="-5" width="5" height="5" fill="#22C55E"/>
    <rect x="-2" y="-5" width="5" height="5" fill="#22C55E" fill-opacity="0.4"/>
    <line x1="-10" y1="4" x2="10" y2="4" stroke="#4B5563" stroke-width="0.8"/>
    <!-- C-band SAR antenna (the long rectangular one) -->
    <rect x="-8" y="12" width="16" height="4" rx="1" fill="#9CA3AF" stroke="#E5E7EB" stroke-width="1"/>
    <!-- high-gain antenna -->
    <line x1="0" y1="-10" x2="0" y2="-22" stroke="#E5E7EB" stroke-width="1.4"/>
    <circle cx="0" cy="-22" r="2.8" fill="#E5E7EB"/>
    <circle cx="0" cy="-22" r="1.2" fill="#22C55E"/>
  </g>

  <!-- tiny label: scan cadence hint -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="rgba(255,255,255,0.55)">
    <text x="20" y="30" letter-spacing="1">SENTINEL&#8209;1&#8239;&#183;&#8239;C&#8209;BAND&#8239;&#183;&#8239;2019&#8209;2023</text>
  </g>
</svg>
