<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260" role="img" aria-label="Satellit scannt Grundstueck">
  <defs>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </linearGradient>
    <pattern id="heroGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- backdrop grid (transparent, shows on dark hero) -->
  <rect width="400" height="260" fill="url(#heroGrid)"/>

  <!-- ground baseline -->
  <line x1="0" y1="210" x2="400" y2="210" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <line x1="0" y1="225" x2="400" y2="225" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <line x1="0" y1="240" x2="400" y2="240" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- houses silhouettes -->
  <g fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.7)" stroke-width="1.2" stroke-linejoin="round">
    <path d="M70 210 L70 185 L92 168 L114 185 L114 210 Z"/>
    <rect x="84" y="192" width="8" height="18" fill="rgba(255,255,255,0.4)"/>
    <path d="M170 210 L170 178 L196 160 L222 178 L222 210 Z"/>
    <rect x="188" y="188" width="10" height="22" fill="rgba(255,255,255,0.4)"/>
    <path d="M278 210 L278 188 L300 172 L322 188 L322 210 Z"/>
    <rect x="292" y="194" width="8" height="16" fill="rgba(255,255,255,0.4)"/>
  </g>

  <!-- measurement dots (InSAR points, traffic light colors) -->
  <g>
    <circle cx="40" cy="220" r="3" fill="#22C55E"/>
    <circle cx="95" cy="222" r="3" fill="#22C55E"/>
    <circle cx="145" cy="220" r="3" fill="#22C55E"/>
    <circle cx="195" cy="222" r="3" fill="#22C55E"/>
    <circle cx="245" cy="220" r="3" fill="#FACC15"/>
    <circle cx="298" cy="222" r="3" fill="#22C55E"/>
    <circle cx="350" cy="220" r="3" fill="#22C55E"/>
    <circle cx="118" cy="235" r="2.5" fill="#22C55E"/>
    <circle cx="220" cy="235" r="2.5" fill="#22C55E"/>
    <circle cx="325" cy="235" r="2.5" fill="#FACC15"/>
  </g>

  <!-- satellite -->
  <g transform="translate(300, 52)">
    <!-- solar panel L -->
    <rect x="-42" y="-4" width="30" height="12" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-width="1.2"/>
    <line x1="-35" y1="-4" x2="-35" y2="8" stroke="#22C55E" stroke-width="0.6"/>
    <line x1="-28" y1="-4" x2="-28" y2="8" stroke="#22C55E" stroke-width="0.6"/>
    <line x1="-21" y1="-4" x2="-21" y2="8" stroke="#22C55E" stroke-width="0.6"/>
    <!-- solar panel R -->
    <rect x="12" y="-4" width="30" height="12" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-width="1.2"/>
    <line x1="19" y1="-4" x2="19" y2="8" stroke="#22C55E" stroke-width="0.6"/>
    <line x1="26" y1="-4" x2="26" y2="8" stroke="#22C55E" stroke-width="0.6"/>
    <line x1="33" y1="-4" x2="33" y2="8" stroke="#22C55E" stroke-width="0.6"/>
    <!-- body -->
    <rect x="-12" y="-7" width="24" height="18" rx="2" fill="rgba(255,255,255,0.12)" stroke="white" stroke-width="1.3"/>
    <rect x="-8" y="-3" width="4" height="4" fill="#22C55E"/>
    <rect x="-2" y="-3" width="4" height="4" fill="#22C55E" fill-opacity="0.4"/>
    <!-- antenna -->
    <line x1="0" y1="-7" x2="0" y2="-18" stroke="white" stroke-width="1.3"/>
    <circle cx="0" cy="-18" r="2.5" fill="white"/>
  </g>

  <!-- scan cone -->
  <path d="M300 67 L254 205 L346 205 Z" fill="url(#scanGrad)"/>
  <line x1="300" y1="67" x2="254" y2="205" stroke="#22C55E" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>
  <line x1="300" y1="67" x2="346" y2="205" stroke="#22C55E" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>

  <!-- scan wave animation indicator (static) -->
  <ellipse cx="300" cy="198" rx="45" ry="4" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.4"/>
  <ellipse cx="300" cy="198" rx="30" ry="2.5" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.7"/>
</svg>
