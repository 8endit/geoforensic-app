<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" width="560" height="360" role="img" aria-label="Datenfluss Satellit zu Bodenbericht PDF">
  <defs>
    <linearGradient id="dataLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="pdfShade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F3F4F6"/>
    </linearGradient>
    <linearGradient id="pdfHeader" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1d3a"/>
      <stop offset="100%" stop-color="#1a3a6b"/>
    </linearGradient>
    <linearGradient id="satBodyShade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F3F4F6"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="560" height="360" fill="#FAFAF7"/>

  <!-- Dotted orbit arc above -->
  <path d="M 80 100 Q 280 10 480 100" fill="none" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.55"/>

  <!-- Satellite at top center -->
  <g transform="translate(280, 64)">
    <!-- solar panel L -->
    <g transform="translate(-58, 0)">
      <rect x="0" y="-5" width="38" height="14" fill="#1F2937" stroke="#166534" stroke-width="1.2"/>
      <line x1="9" y1="-5" x2="9" y2="9" stroke="#22C55E" stroke-width="0.7"/>
      <line x1="18" y1="-5" x2="18" y2="9" stroke="#22C55E" stroke-width="0.7"/>
      <line x1="27" y1="-5" x2="27" y2="9" stroke="#22C55E" stroke-width="0.7"/>
      <line x1="0" y1="2" x2="38" y2="2" stroke="#22C55E" stroke-width="0.5" opacity="0.5"/>
    </g>
    <line x1="-20" y1="0" x2="-12" y2="0" stroke="#374151" stroke-width="1.5"/>
    <g transform="translate(20, 0)">
      <rect x="0" y="-5" width="38" height="14" fill="#1F2937" stroke="#166534" stroke-width="1.2"/>
      <line x1="9" y1="-5" x2="9" y2="9" stroke="#22C55E" stroke-width="0.7"/>
      <line x1="18" y1="-5" x2="18" y2="9" stroke="#22C55E" stroke-width="0.7"/>
      <line x1="27" y1="-5" x2="27" y2="9" stroke="#22C55E" stroke-width="0.7"/>
      <line x1="0" y1="2" x2="38" y2="2" stroke="#22C55E" stroke-width="0.5" opacity="0.5"/>
    </g>
    <line x1="12" y1="0" x2="20" y2="0" stroke="#374151" stroke-width="1.5"/>
    <!-- body -->
    <rect x="-14" y="-11" width="28" height="22" rx="2" fill="url(#satBodyShade)" stroke="#374151" stroke-width="1.4"/>
    <rect x="-9" y="-6" width="5" height="5" fill="#166534"/>
    <rect x="-2" y="-6" width="5" height="5" fill="#166534" fill-opacity="0.4"/>
    <line x1="-10" y1="4" x2="10" y2="4" stroke="#4B5563" stroke-width="0.8"/>
    <rect x="-8" y="11" width="16" height="4" rx="1" fill="#9CA3AF" stroke="#374151" stroke-width="1"/>
    <line x1="0" y1="-11" x2="0" y2="-22" stroke="#374151" stroke-width="1.4"/>
    <circle cx="0" cy="-22" r="2.5" fill="#374151"/>
    <circle cx="0" cy="-22" r="1" fill="#22C55E"/>
  </g>

  <!-- Data stream (subtle, elegant) -->
  <line x1="280" y1="95" x2="280" y2="215" stroke="url(#dataLine)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Floating data packet dots along line -->
  <g>
    <rect x="275" y="118" width="10" height="5" rx="1.5" fill="#166534"/>
    <rect x="275" y="142" width="10" height="5" rx="1.5" fill="#166534" opacity="0.7"/>
    <rect x="275" y="166" width="10" height="5" rx="1.5" fill="#166534" opacity="0.5"/>
    <rect x="275" y="190" width="10" height="5" rx="1.5" fill="#166534" opacity="0.35"/>
  </g>

  <!-- Data-source caption strip (single line, editorial) -->
  <g transform="translate(280, 165)">
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="11" fill="#6B7280">
      Copernicus  &#183;  LUCAS  &#183;  SoilGrids  &#183;  Nominatim
    </text>
  </g>

  <!-- PDF report with subtle depth -->
  <g transform="translate(280, 260)">
    <!-- shadow layer -->
    <rect x="-68" y="-48" width="140" height="110" rx="4" fill="#D1D5DB" opacity="0.35" transform="translate(4,4)"/>
    <!-- second sheet peek -->
    <rect x="-64" y="-44" width="140" height="110" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="0.8"/>
    <!-- main sheet -->
    <rect x="-70" y="-50" width="140" height="110" rx="4" fill="url(#pdfShade)" stroke="#9CA3AF" stroke-width="1.2"/>
    <!-- header -->
    <rect x="-70" y="-50" width="140" height="22" rx="4" fill="url(#pdfHeader)"/>
    <path d="M -70 -28 L 70 -28 L 70 -39 L -70 -39 Z" fill="url(#pdfHeader)"/>
    <text x="0" y="-34" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="600" fill="#FFFFFF" letter-spacing="0.5">
      BODENBERICHT
    </text>

    <!-- score gauge mock -->
    <g transform="translate(-38, -8)">
      <path d="M -16 0 A 16 16 0 0 1 16 0" fill="none" stroke="#E5E7EB" stroke-width="4" stroke-linecap="round"/>
      <path d="M -16 0 A 16 16 0 0 1 13.5 -8" fill="none" stroke="#166534" stroke-width="4" stroke-linecap="round"/>
      <text x="0" y="-2" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="700" fill="#1F2937">85</text>
    </g>
    <text x="-38" y="16" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="7" fill="#6B7280" letter-spacing="0.5">GEOSCORE</text>

    <!-- data rows mock -->
    <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="7" fill="#4B5563">
      <rect x="-8" y="-18" width="70" height="3" rx="1" fill="#E5E7EB"/>
      <rect x="-8" y="-18" width="50" height="3" rx="1" fill="#166534"/>
      <text x="-8" y="-22">Bodenbewegung</text>

      <rect x="-8" y="-2" width="70" height="3" rx="1" fill="#E5E7EB"/>
      <rect x="-8" y="-2" width="38" height="3" rx="1" fill="#166534"/>
      <text x="-8" y="-6">LUCAS EU Einordnung</text>

      <rect x="-8" y="14" width="70" height="3" rx="1" fill="#E5E7EB"/>
      <rect x="-8" y="14" width="24" height="3" rx="1" fill="#B45309"/>
      <text x="-8" y="10">SoilGrids Basis</text>
    </g>

    <!-- ampel chip -->
    <g transform="translate(45, 40)">
      <rect x="-18" y="-5" width="36" height="10" rx="5" fill="#DCFCE7" stroke="#166534" stroke-width="0.6"/>
      <circle cx="-10" cy="0" r="2.2" fill="#166534"/>
      <text x="-4" y="3" font-family="ui-sans-serif, system-ui, sans-serif" font-size="7" font-weight="600" fill="#166534">stabil</text>
    </g>
  </g>
</svg>
