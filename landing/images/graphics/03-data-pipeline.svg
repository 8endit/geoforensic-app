<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260" role="img" aria-label="Datenfluss von Satellit zu PDF-Bericht">
  <defs>
    <linearGradient id="dataStream" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16A34A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#16A34A" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="pdfShadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F3F4F6"/>
    </linearGradient>
  </defs>

  <!-- orbit arc -->
  <path d="M 50 80 Q 200 30 350 80" fill="none" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- satellite at top -->
  <g transform="translate(200, 48)">
    <!-- solar panel L -->
    <rect x="-36" y="-3" width="24" height="10" fill="#E8F5EC" stroke="#16A34A" stroke-width="1.2"/>
    <line x1="-30" y1="-3" x2="-30" y2="7" stroke="#16A34A" stroke-width="0.6"/>
    <line x1="-24" y1="-3" x2="-24" y2="7" stroke="#16A34A" stroke-width="0.6"/>
    <line x1="-18" y1="-3" x2="-18" y2="7" stroke="#16A34A" stroke-width="0.6"/>
    <!-- solar panel R -->
    <rect x="12" y="-3" width="24" height="10" fill="#E8F5EC" stroke="#16A34A" stroke-width="1.2"/>
    <line x1="18" y1="-3" x2="18" y2="7" stroke="#16A34A" stroke-width="0.6"/>
    <line x1="24" y1="-3" x2="24" y2="7" stroke="#16A34A" stroke-width="0.6"/>
    <line x1="30" y1="-3" x2="30" y2="7" stroke="#16A34A" stroke-width="0.6"/>
    <!-- body -->
    <rect x="-10" y="-6" width="20" height="16" rx="2" fill="#F3F4F6" stroke="#374151" stroke-width="1.2"/>
    <rect x="-6" y="-2" width="3" height="3" fill="#16A34A"/>
    <rect x="-1" y="-2" width="3" height="3" fill="#16A34A" fill-opacity="0.4"/>
    <!-- antenna up -->
    <line x1="0" y1="-6" x2="0" y2="-14" stroke="#374151" stroke-width="1.2"/>
    <circle cx="0" cy="-14" r="2" fill="#374151"/>
  </g>

  <!-- data stream (dots falling) -->
  <g>
    <rect x="196" y="75" width="8" height="5" rx="1" fill="#16A34A"/>
    <rect x="196" y="90" width="8" height="5" rx="1" fill="#16A34A" opacity="0.85"/>
    <rect x="196" y="105" width="8" height="5" rx="1" fill="#16A34A" opacity="0.7"/>
    <rect x="196" y="120" width="8" height="5" rx="1" fill="#16A34A" opacity="0.55"/>
    <rect x="196" y="135" width="8" height="5" rx="1" fill="#16A34A" opacity="0.4"/>
  </g>

  <!-- data source tags on the sides -->
  <g font-family="system-ui,sans-serif" font-size="10" fill="#4B5563">
    <g transform="translate(60, 110)">
      <rect x="-4" y="-10" width="80" height="20" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="0.8"/>
      <text x="36" y="4" text-anchor="middle" font-weight="600">Copernicus</text>
    </g>
    <g transform="translate(290, 110)">
      <rect x="-4" y="-10" width="80" height="20" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="0.8"/>
      <text x="36" y="4" text-anchor="middle" font-weight="600">SoilGrids</text>
    </g>
    <g transform="translate(60, 145)">
      <rect x="-4" y="-10" width="80" height="20" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="0.8"/>
      <text x="36" y="4" text-anchor="middle" font-weight="600">LUCAS EU</text>
    </g>
    <g transform="translate(290, 145)">
      <rect x="-4" y="-10" width="80" height="20" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="0.8"/>
      <text x="36" y="4" text-anchor="middle" font-weight="600">Nominatim</text>
    </g>
  </g>

  <!-- data merge lines -->
  <g stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3 2" fill="none">
    <path d="M140 115 Q 180 135 195 160"/>
    <path d="M260 115 Q 220 135 205 160"/>
    <path d="M140 150 Q 180 160 195 175"/>
    <path d="M260 150 Q 220 160 205 175"/>
  </g>

  <!-- PDF report icon -->
  <g transform="translate(200, 210)">
    <rect x="-30" y="-30" width="60" height="40" rx="4" fill="url(#pdfShadow)" stroke="#16A34A" stroke-width="1.5"/>
    <rect x="-30" y="-30" width="60" height="10" fill="#16A34A"/>
    <text x="0" y="-22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="white">BODENBERICHT</text>
    <line x1="-22" y1="-12" x2="18" y2="-12" stroke="#D1D5DB" stroke-width="1.2"/>
    <line x1="-22" y1="-7" x2="12" y2="-7" stroke="#D1D5DB" stroke-width="1.2"/>
    <line x1="-22" y1="-2" x2="20" y2="-2" stroke="#D1D5DB" stroke-width="1.2"/>
    <line x1="-22" y1="3" x2="10" y2="3" stroke="#D1D5DB" stroke-width="1.2"/>
    <!-- small ampel dot -->
    <circle cx="15" cy="5" r="3" fill="#22C55E"/>
  </g>
</svg>
