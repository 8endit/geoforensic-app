<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" width="560" height="360" role="img" aria-label="Einzelnes Haus im Zoom mit mehreren Messpunkten auf und um das Grundstueck">
  <defs>
    <radialGradient id="bStableGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#166534" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#166534" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bWatchGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B45309" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#B45309" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- cream base -->
  <rect width="560" height="360" fill="#F7F3EA"/>

  <!-- header -->
  <g font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#6B5D3F">
    <text x="30" y="32" letter-spacing="1">IHRE ADRESSE &#183; NAH GEZOOMT</text>
  </g>
  <line x1="30" y1="44" x2="530" y2="44" stroke="#E4DCC6" stroke-width="1"/>

  <!-- faint neighbour context: partial footprints in corners -->
  <g fill="#EDE4CC" stroke="#D4C7A0" stroke-width="0.8">
    <rect x="30"  y="220" width="80"  height="60" rx="2"/>
    <rect x="450" y="220" width="80"  height="60" rx="2"/>
    <rect x="30"  y="80"  width="60"  height="50" rx="2"/>
    <rect x="470" y="80"  width="60"  height="50" rx="2"/>
  </g>

  <!-- garden hints -->
  <g fill="#D7E8C8" opacity="0.75" stroke="none">
    <path d="M 130 270 Q 180 250 230 278 L 230 325 L 130 325 Z"/>
    <path d="M 430 270 Q 380 250 330 278 L 330 325 L 430 325 Z"/>
  </g>

  <!-- driveway -->
  <rect x="238" y="278" width="84" height="47" fill="#E7DEC4"/>

  <!-- HOUSE: big centered footprint -->
  <rect x="154" y="114" width="252" height="158" rx="3" fill="#6B5D3F" fill-opacity="0.10"/>
  <rect x="150" y="110" width="252" height="158" rx="3" fill="#FFFFFF" stroke="#6B5D3F" stroke-width="1.4"/>

  <!-- roof -->
  <g fill="#C4A57A" stroke="#8A7A55" stroke-width="0.8">
    <rect x="150" y="110" width="252" height="79"/>
  </g>
  <line x1="150" y1="189" x2="402" y2="189" stroke="#6B5D3F" stroke-width="1.2"/>
  <g fill="#B89566" opacity="0.45">
    <rect x="150" y="110" width="126" height="79"/>
  </g>

  <!-- lower portion -->
  <rect x="150" y="189" width="252" height="79" rx="2" fill="#F1E8D1" stroke="#6B5D3F" stroke-width="1.2"/>

  <!-- door + windows -->
  <rect x="262" y="244" width="28" height="24" fill="#C4A57A" stroke="#8A7A55" stroke-width="0.6"/>
  <g fill="#FFFFFF" stroke="#C9BC95" stroke-width="0.8">
    <rect x="174" y="224" width="34" height="16"/>
    <rect x="344" y="224" width="34" height="16"/>
  </g>

  <!-- property boundary (dashed) -->
  <rect x="120" y="82" width="312" height="216" rx="4" fill="none" stroke="#166534" stroke-width="1.8" stroke-dasharray="5 4" opacity="0.55"/>

  <!-- property pin at center of house -->
  <g transform="translate(276, 100)">
    <path d="M 0 -10 C -7 -10 -11 -5 -11 0 C -11 8 0 18 0 18 C 0 18 11 8 11 0 C 11 -5 7 -10 0 -10 Z"
          fill="#166534" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="#FFFFFF"/>
  </g>

  <!-- ===== Measurement dots (honest placement, no part-attribution) ===== -->
  <!-- dots cluster on the building + within the property boundary.
       Color only (stable/watch) — no velocity labels, no "Dach Nord" nonsense. -->
  <g>
    <!-- on roof area -->
    <circle cx="198" cy="148" r="13" fill="url(#bStableGlow)"/>
    <circle cx="198" cy="148" r="4.5" fill="#166534" stroke="#F7F3EA" stroke-width="1.2"/>

    <circle cx="330" cy="146" r="13" fill="url(#bStableGlow)"/>
    <circle cx="330" cy="146" r="4.5" fill="#166534" stroke="#F7F3EA" stroke-width="1.2"/>

    <circle cx="258" cy="172" r="13" fill="url(#bStableGlow)"/>
    <circle cx="258" cy="172" r="4.5" fill="#166534" stroke="#F7F3EA" stroke-width="1.2"/>

    <!-- on wall / lower floor -->
    <circle cx="186" cy="232" r="15" fill="url(#bWatchGlow)"/>
    <circle cx="186" cy="232" r="5"  fill="#B45309" stroke="#F7F3EA" stroke-width="1.2"/>

    <circle cx="370" cy="220" r="13" fill="url(#bStableGlow)"/>
    <circle cx="370" cy="220" r="4.5" fill="#166534" stroke="#F7F3EA" stroke-width="1.2"/>

    <!-- in property boundary (garden / driveway) -->
    <circle cx="145" cy="290" r="13" fill="url(#bStableGlow)"/>
    <circle cx="145" cy="290" r="4.5" fill="#166534" stroke="#F7F3EA" stroke-width="1.2"/>

    <circle cx="415" cy="290" r="13" fill="url(#bStableGlow)"/>
    <circle cx="415" cy="290" r="4.5" fill="#166534" stroke="#F7F3EA" stroke-width="1.2"/>
  </g>

  <!-- subtle legend, bottom-left -->
  <g transform="translate(30, 326)" font-family="Georgia, serif" font-size="11" fill="#44433E">
    <circle cx="6" cy="6" r="4" fill="#166534"/>
    <text x="16" y="10">stabil</text>
    <circle cx="76" cy="6" r="4" fill="#B45309"/>
    <text x="86" y="10">auffaellig</text>
  </g>

  <!-- caption -->
  <g font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#1F2937">
    <text x="530" y="334" text-anchor="end">Messpunkte auf und um Ihr Grundstueck.</text>
  </g>
</svg>
