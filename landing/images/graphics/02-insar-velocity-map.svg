<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260" role="img" aria-label="InSAR Bodenbewegungskarte mit Ampel-Punkten">
  <defs>
    <pattern id="insarGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E5E7EB" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="yellowGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FACC15" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FACC15" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- map background -->
  <rect width="400" height="260" fill="#F9FAFB"/>
  <rect width="400" height="260" fill="url(#insarGrid)"/>

  <!-- stylized city blocks (top-down view) -->
  <g fill="#D1D5DB" stroke="#9CA3AF" stroke-width="0.8">
    <rect x="30" y="40" width="60" height="40" rx="2"/>
    <rect x="100" y="40" width="80" height="50" rx="2"/>
    <rect x="190" y="40" width="50" height="40" rx="2"/>
    <rect x="250" y="40" width="70" height="55" rx="2"/>
    <rect x="330" y="40" width="50" height="45" rx="2"/>

    <rect x="30" y="100" width="70" height="55" rx="2"/>
    <rect x="110" y="110" width="60" height="45" rx="2"/>
    <rect x="180" y="100" width="90" height="60" rx="2"/>
    <rect x="280" y="110" width="55" height="50" rx="2"/>
    <rect x="345" y="105" width="35" height="55" rx="2"/>

    <rect x="30" y="175" width="55" height="45" rx="2"/>
    <rect x="95" y="180" width="70" height="40" rx="2"/>
    <rect x="175" y="175" width="60" height="50" rx="2"/>
    <rect x="245" y="180" width="80" height="45" rx="2"/>
    <rect x="335" y="175" width="45" height="50" rx="2"/>
  </g>

  <!-- streets (gaps) -->
  <g stroke="#F3F4F6" stroke-width="1.5">
    <line x1="0" y1="92" x2="400" y2="92"/>
    <line x1="0" y1="167" x2="400" y2="167"/>
  </g>

  <!-- measurement points with glow, green (stable) -->
  <g>
    <circle cx="60" cy="60" r="12" fill="url(#greenGlow)"/>
    <circle cx="60" cy="60" r="3.5" fill="#22C55E" stroke="white" stroke-width="1"/>
    <circle cx="140" cy="65" r="12" fill="url(#greenGlow)"/>
    <circle cx="140" cy="65" r="3.5" fill="#22C55E" stroke="white" stroke-width="1"/>
    <circle cx="215" cy="60" r="12" fill="url(#greenGlow)"/>
    <circle cx="215" cy="60" r="3.5" fill="#22C55E" stroke="white" stroke-width="1"/>
    <circle cx="355" cy="65" r="12" fill="url(#greenGlow)"/>
    <circle cx="355" cy="65" r="3.5" fill="#22C55E" stroke="white" stroke-width="1"/>

    <circle cx="65" cy="130" r="12" fill="url(#greenGlow)"/>
    <circle cx="65" cy="130" r="3.5" fill="#22C55E" stroke="white" stroke-width="1"/>
    <circle cx="230" cy="130" r="12" fill="url(#greenGlow)"/>
    <circle cx="230" cy="130" r="3.5" fill="#22C55E" stroke="white" stroke-width="1"/>
    <circle cx="305" cy="135" r="12" fill="url(#greenGlow)"/>
    <circle cx="305" cy="135" r="3.5" fill="#22C55E" stroke="white" stroke-width="1"/>

    <circle cx="60" cy="200" r="12" fill="url(#greenGlow)"/>
    <circle cx="60" cy="200" r="3.5" fill="#22C55E" stroke="white" stroke-width="1"/>
    <circle cx="205" cy="200" r="12" fill="url(#greenGlow)"/>
    <circle cx="205" cy="200" r="3.5" fill="#22C55E" stroke="white" stroke-width="1"/>
    <circle cx="360" cy="200" r="12" fill="url(#greenGlow)"/>
    <circle cx="360" cy="200" r="3.5" fill="#22C55E" stroke="white" stroke-width="1"/>
  </g>

  <!-- yellow points (watchful) -->
  <g>
    <circle cx="285" cy="65" r="14" fill="url(#yellowGlow)"/>
    <circle cx="285" cy="65" r="3.5" fill="#FACC15" stroke="white" stroke-width="1"/>
    <circle cx="135" cy="135" r="14" fill="url(#yellowGlow)"/>
    <circle cx="135" cy="135" r="3.5" fill="#FACC15" stroke="white" stroke-width="1"/>
    <circle cx="125" cy="200" r="14" fill="url(#yellowGlow)"/>
    <circle cx="125" cy="200" r="3.5" fill="#FACC15" stroke="white" stroke-width="1"/>
  </g>

  <!-- one red point (significant) -->
  <g>
    <circle cx="280" cy="200" r="16" fill="url(#redGlow)"/>
    <circle cx="280" cy="200" r="4" fill="#EF4444" stroke="white" stroke-width="1"/>
  </g>

  <!-- legend -->
  <g transform="translate(20, 235)">
    <circle cx="8" cy="8" r="3.5" fill="#22C55E"/>
    <text x="18" y="12" font-family="system-ui,sans-serif" font-size="10" fill="#374151">stabil</text>
    <circle cx="68" cy="8" r="3.5" fill="#FACC15"/>
    <text x="78" y="12" font-family="system-ui,sans-serif" font-size="10" fill="#374151">beobachten</text>
    <circle cx="155" cy="8" r="3.5" fill="#EF4444"/>
    <text x="165" y="12" font-family="system-ui,sans-serif" font-size="10" fill="#374151">signifikant</text>
  </g>
</svg>
