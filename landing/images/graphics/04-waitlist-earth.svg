<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="720" height="320" role="img" aria-label="Erde mit Satellit auf Orbit — Premium in Entwicklung">
  <defs>
    <radialGradient id="earthFill" cx="50%" cy="70%" r="70%">
      <stop offset="0%" stop-color="#E8F5EC"/>
      <stop offset="55%" stop-color="#BFDBC7"/>
      <stop offset="100%" stop-color="#8AAE97"/>
    </radialGradient>
    <linearGradient id="atmosphere" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#DCFCE7" stop-opacity="0"/>
      <stop offset="90%" stop-color="#DCFCE7" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="orbitFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#166534" stop-opacity="0"/>
      <stop offset="40%" stop-color="#166534" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#166534" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#166534" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#166534" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="cityPulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft gradient background -->
  <rect width="720" height="320" fill="#FAFAF7"/>

  <!-- sparse stars -->
  <g fill="#9CA3AF">
    <circle cx="80" cy="30" r="1" opacity="0.5"/>
    <circle cx="145" cy="60" r="0.8" opacity="0.4"/>
    <circle cx="230" cy="25" r="1.2" opacity="0.6"/>
    <circle cx="310" cy="50" r="0.7" opacity="0.35"/>
    <circle cx="440" cy="28" r="0.9" opacity="0.5"/>
    <circle cx="520" cy="55" r="1" opacity="0.55"/>
    <circle cx="600" cy="30" r="0.8" opacity="0.45"/>
    <circle cx="660" cy="60" r="0.7" opacity="0.35"/>
  </g>

  <!-- atmosphere halo above earth -->
  <path d="M 0 300 Q 360 120 720 300 L 720 320 L 0 320 Z" fill="url(#atmosphere)"/>
  <path d="M 0 305 Q 360 135 720 305" fill="none" stroke="#BFDBC7" stroke-width="1" opacity="0.5"/>

  <!-- Earth curvature -->
  <path d="M 0 310 Q 360 130 720 310 L 720 320 L 0 320 Z" fill="url(#earthFill)" stroke="#166534" stroke-width="1.2" stroke-opacity="0.3"/>

  <!-- latitude contours -->
  <g fill="none" stroke="#166534" stroke-opacity="0.22" stroke-width="0.7">
    <path d="M 40 282 Q 360 200 680 282"/>
    <path d="M 90 250 Q 360 180 630 250"/>
    <path d="M 140 225 Q 360 165 580 225"/>
    <path d="M 200 205 Q 360 160 520 205"/>
  </g>

  <!-- longitude contour (curved vertical-ish) -->
  <g fill="none" stroke="#166534" stroke-opacity="0.15" stroke-width="0.6">
    <path d="M 240 310 Q 230 220 260 145"/>
    <path d="M 360 320 Q 360 220 360 130"/>
    <path d="M 480 310 Q 490 220 460 145"/>
  </g>

  <!-- City lights / pulse points on earth (replaces houses) -->
  <g>
    <circle cx="180" cy="248" r="7" fill="url(#cityPulse)"/>
    <circle cx="180" cy="248" r="1.8" fill="#166534"/>
    <circle cx="265" cy="215" r="8" fill="url(#cityPulse)"/>
    <circle cx="265" cy="215" r="2" fill="#166534"/>
    <circle cx="360" cy="195" r="9" fill="url(#cityPulse)"/>
    <circle cx="360" cy="195" r="2.2" fill="#166534"/>
    <circle cx="455" cy="215" r="8" fill="url(#cityPulse)"/>
    <circle cx="455" cy="215" r="2" fill="#166534"/>
    <circle cx="540" cy="248" r="7" fill="url(#cityPulse)"/>
    <circle cx="540" cy="248" r="1.8" fill="#166534"/>
    <circle cx="110" cy="285" r="5" fill="url(#cityPulse)"/>
    <circle cx="110" cy="285" r="1.5" fill="#166534"/>
    <circle cx="610" cy="285" r="5" fill="url(#cityPulse)"/>
    <circle cx="610" cy="285" r="1.5" fill="#166534"/>
  </g>

  <!-- Orbit path (wide arc) -->
  <path d="M 50 130 Q 360 -30 670 130" fill="none" stroke="url(#orbitFade)" stroke-width="1.6" stroke-dasharray="6 4"/>

  <!-- Satellite on orbit (slightly off-center for composition) -->
  <g transform="translate(480, 48)">
    <g transform="translate(-46, 0)">
      <rect x="0" y="-5" width="34" height="13" fill="#1F2937" stroke="#166534" stroke-width="1.1"/>
      <line x1="8" y1="-5" x2="8" y2="8" stroke="#22C55E" stroke-width="0.6"/>
      <line x1="16" y1="-5" x2="16" y2="8" stroke="#22C55E" stroke-width="0.6"/>
      <line x1="24" y1="-5" x2="24" y2="8" stroke="#22C55E" stroke-width="0.6"/>
    </g>
    <line x1="-17" y1="0" x2="-12" y2="0" stroke="#374151" stroke-width="1.4"/>
    <g transform="translate(12, 0)">
      <rect x="0" y="-5" width="34" height="13" fill="#1F2937" stroke="#166534" stroke-width="1.1"/>
      <line x1="8" y1="-5" x2="8" y2="8" stroke="#22C55E" stroke-width="0.6"/>
      <line x1="16" y1="-5" x2="16" y2="8" stroke="#22C55E" stroke-width="0.6"/>
      <line x1="24" y1="-5" x2="24" y2="8" stroke="#22C55E" stroke-width="0.6"/>
    </g>
    <line x1="12" y1="0" x2="17" y2="0" stroke="#374151" stroke-width="1.4"/>
    <rect x="-12" y="-9" width="24" height="18" rx="2" fill="#F3F4F6" stroke="#374151" stroke-width="1.3"/>
    <rect x="-8" y="-5" width="4" height="4" fill="#166534"/>
    <rect x="-2" y="-5" width="4" height="4" fill="#166534" fill-opacity="0.4"/>
    <line x1="-9" y1="3" x2="9" y2="3" stroke="#4B5563" stroke-width="0.8"/>
    <rect x="-7" y="9" width="14" height="3" rx="0.5" fill="#9CA3AF" stroke="#374151" stroke-width="0.8"/>
    <line x1="0" y1="-9" x2="0" y2="-18" stroke="#374151" stroke-width="1.3"/>
    <circle cx="0" cy="-18" r="2.2" fill="#374151"/>
    <circle cx="0" cy="-18" r="1" fill="#22C55E"/>
  </g>

  <!-- Scan beam to earth (subtle) -->
  <path d="M 480 58 L 440 200 L 520 200 Z" fill="#166534" fill-opacity="0.06"/>
  <line x1="480" y1="58" x2="440" y2="200" stroke="#166534" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.35"/>
  <line x1="480" y1="58" x2="520" y2="200" stroke="#166534" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.35"/>
  <ellipse cx="480" cy="198" rx="22" ry="2" fill="none" stroke="#166534" stroke-width="0.8" opacity="0.45"/>
  <ellipse cx="480" cy="198" rx="12" ry="1.2" fill="none" stroke="#166534" stroke-width="0.8" opacity="0.65"/>

  <!-- Top-right discreet caption, serif for authority -->
  <g font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#6B7280">
    <text x="696" y="32" text-anchor="end" font-style="italic">Premium &#183; in Entwicklung</text>
  </g>
</svg>
