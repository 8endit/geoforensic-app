<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" width="500" height="220" role="img" aria-label="Erdkugel mit Satellit fuer Premium-Warteliste">
  <defs>
    <radialGradient id="earthFill" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#E8F5EC"/>
      <stop offset="60%" stop-color="#CDE7D6"/>
      <stop offset="100%" stop-color="#A9D6BA"/>
    </radialGradient>
    <linearGradient id="orbitFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16A34A" stop-opacity="0"/>
      <stop offset="50%" stop-color="#16A34A" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#16A34A" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Earth arc (curvature on bottom half) -->
  <path d="M 0 210 Q 250 60 500 210 Z" fill="url(#earthFill)" stroke="#16A34A" stroke-width="1.2" stroke-opacity="0.35"/>

  <!-- latitude lines -->
  <path d="M 45 178 Q 250 130 455 178" fill="none" stroke="#16A34A" stroke-width="0.6" stroke-opacity="0.28"/>
  <path d="M 80 155 Q 250 118 420 155" fill="none" stroke="#16A34A" stroke-width="0.6" stroke-opacity="0.22"/>
  <path d="M 120 135 Q 250 110 380 135" fill="none" stroke="#16A34A" stroke-width="0.6" stroke-opacity="0.18"/>

  <!-- houses on earth surface -->
  <g fill="#16A34A" fill-opacity="0.55">
    <path d="M120 160 L120 150 L128 143 L136 150 L136 160 Z"/>
    <path d="M180 145 L180 135 L189 128 L198 135 L198 145 Z"/>
    <path d="M245 132 L245 121 L254 114 L263 121 L263 132 Z"/>
    <path d="M310 138 L310 128 L319 121 L328 128 L328 138 Z"/>
    <path d="M370 155 L370 145 L378 138 L386 145 L386 155 Z"/>
  </g>
  <!-- little roof dots as windows -->
  <g fill="#FFFFFF">
    <rect x="126" y="153" width="2" height="4"/>
    <rect x="186" y="138" width="2" height="4"/>
    <rect x="251" y="125" width="2" height="4"/>
    <rect x="316" y="131" width="2" height="4"/>
    <rect x="374" y="148" width="2" height="4"/>
  </g>

  <!-- orbit curve above earth -->
  <path d="M 30 90 Q 250 -30 470 90" fill="none" stroke="url(#orbitFade)" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- satellite on orbit -->
  <g transform="translate(330, 42)">
    <rect x="-22" y="-3" width="16" height="9" fill="#16A34A" fill-opacity="0.2" stroke="#16A34A" stroke-width="1"/>
    <line x1="-18" y1="-3" x2="-18" y2="6" stroke="#16A34A" stroke-width="0.5"/>
    <line x1="-14" y1="-3" x2="-14" y2="6" stroke="#16A34A" stroke-width="0.5"/>
    <rect x="6" y="-3" width="16" height="9" fill="#16A34A" fill-opacity="0.2" stroke="#16A34A" stroke-width="1"/>
    <line x1="10" y1="-3" x2="10" y2="6" stroke="#16A34A" stroke-width="0.5"/>
    <line x1="14" y1="-3" x2="14" y2="6" stroke="#16A34A" stroke-width="0.5"/>
    <line x1="18" y1="-3" x2="18" y2="6" stroke="#16A34A" stroke-width="0.5"/>
    <rect x="-6" y="-5" width="12" height="12" rx="1.5" fill="#FFFFFF" stroke="#374151" stroke-width="1"/>
    <rect x="-3" y="-2" width="2" height="2" fill="#16A34A"/>
    <rect x="1" y="-2" width="2" height="2" fill="#16A34A" fill-opacity="0.4"/>
    <circle cx="0" cy="-8" r="1.6" fill="#374151"/>
    <line x1="0" y1="-5" x2="0" y2="-8" stroke="#374151" stroke-width="1"/>
  </g>

  <!-- scan beam to earth -->
  <path d="M 330 50 L 310 135 L 350 135 Z" fill="#16A34A" fill-opacity="0.08"/>
  <line x1="330" y1="50" x2="310" y2="135" stroke="#16A34A" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.5"/>
  <line x1="330" y1="50" x2="350" y2="135" stroke="#16A34A" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.5"/>

  <!-- stars / space dots -->
  <g fill="#9CA3AF" fill-opacity="0.5">
    <circle cx="40" cy="25" r="1"/>
    <circle cx="95" cy="45" r="0.8"/>
    <circle cx="145" cy="20" r="1.2"/>
    <circle cx="215" cy="35" r="0.8"/>
    <circle cx="410" cy="30" r="1"/>
    <circle cx="460" cy="50" r="0.9"/>
    <circle cx="450" cy="15" r="0.7"/>
    <circle cx="390" cy="55" r="0.8"/>
  </g>
</svg>
