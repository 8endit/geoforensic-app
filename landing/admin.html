<!DOCTYPE html>
<html lang="de">
<head>

<!-- Klaro consent manager (self-hosted, DSGVO-konform) -->
<script defer src="/klaro/klaro-config.js"></script>
<script defer src="/klaro/klaro.js"></script>

<!-- Google Tag Manager (laedt erst nach Einwilligung via Klaro) -->

<meta charset="UTF-8">
<title>Bodenbericht — Admin Dashboard</title>
<link rel="stylesheet" href="/tailwind.css">
<style>
  body { font-family: 'Inter', -apple-system, sans-serif; }
  .card { background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; }
  .kpi-num { font-size: 28px; font-weight: 700; color: #1e3352; line-height: 1; }
  .kpi-lbl { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 6px; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .pill-green { background: #e8f5ec; color: #3d7a50; }
  .pill-gray { background: #f1f5f9; color: #64748b; }
  .pill-blue { background: #e8f0fe; color: #3b6ab5; }
  .pill-purple { background: #f3e8ff; color: #7e22ce; }
  .pill-teaser { background: #e0f2fe; color: #075985; }
  .pill-voll { background: #dcfce7; color: #166534; }
</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<div class="max-w-7xl mx-auto px-6 py-8">
  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-2xl font-bold text-[#1e3352]">Admin Dashboard</h1>
      <p class="text-sm text-gray-500" id="last-refresh">Lade...</p>
    </div>
    <div class="flex gap-2">
      <input id="token-input" type="password" placeholder="Admin Token"
             class="px-3 py-2 border border-gray-300 rounded-md text-sm w-48"
             value="">
      <button onclick="refresh()" class="bg-[#1e3352] text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-[#2c4a70]">
        Aktualisieren
      </button>
      <button onclick="downloadCSV()" class="bg-[#5B9A6F] text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-[#4a8760]">
        CSV Export
      </button>
    </div>
  </div>

  <!-- KPI Cards -->
  <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
    <div class="card">
      <div class="kpi-num" id="kpi-leads-total">–</div>
      <div class="kpi-lbl">Leads gesamt</div>
    </div>
    <div class="card">
      <div class="kpi-num" id="kpi-leads-today">–</div>
      <div class="kpi-lbl">Heute</div>
    </div>
    <div class="card">
      <div class="kpi-num" id="kpi-leads-week">–</div>
      <div class="kpi-lbl">Letzte 7 Tage</div>
    </div>
    <div class="card">
      <div class="kpi-num" id="kpi-waitlist" style="color:#7e22ce;">–</div>
      <div class="kpi-lbl">Warteliste</div>
    </div>
    <div class="card">
      <div class="kpi-num" id="kpi-reports-total">–</div>
      <div class="kpi-lbl">Berichte erstellt</div>
    </div>
  </div>

  <!-- Source Breakdown -->
  <div class="card mb-6">
    <h2 class="text-lg font-semibold mb-4 text-[#1e3352]">Leads nach Quelle</h2>
    <div id="sources" class="flex gap-4 flex-wrap"></div>
  </div>

  <!-- Leads Table -->
  <div class="card">
    <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
      <h2 class="text-lg font-semibold text-[#1e3352]">Leads (letzte 100)</h2>
      <div class="flex gap-2 text-xs">
        <button onclick="setFilter('all')" id="flt-all" class="px-3 py-1.5 rounded border border-gray-300 bg-white hover:bg-gray-50">Alle</button>
        <button onclick="setFilter('report')" id="flt-report" class="px-3 py-1.5 rounded border border-gray-300 bg-white hover:bg-gray-50">Nur Berichts-Leads</button>
        <button onclick="setFilter('waitlist')" id="flt-waitlist" class="px-3 py-1.5 rounded border border-gray-300 bg-white hover:bg-gray-50">Nur Warteliste</button>
      </div>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 border-b-2 border-gray-200">
          <tr class="text-left text-xs uppercase text-gray-500 tracking-wider">
            <th class="px-3 py-2">Zeit</th>
            <th class="px-3 py-2">Name</th>
            <th class="px-3 py-2">Email</th>
            <th class="px-3 py-2">Adresse</th>
            <th class="px-3 py-2">Quelle</th>
            <th class="px-3 py-2">Typ</th>
            <th class="px-3 py-2">Nutzung</th>
            <th class="px-3 py-2">Bedenken</th>
            <th class="px-3 py-2">Dringlichkeit</th>
          </tr>
        </thead>
        <tbody id="leads-body" class="divide-y divide-gray-100"></tbody>
      </table>
    </div>
    <div id="leads-empty" class="hidden text-center py-8 text-gray-400 text-sm">
      Noch keine Leads — warte auf die ersten Besucher.
    </div>
  </div>
</div>

<script>
  function getToken() {
    const t = document.getElementById('token-input').value;
    if (t) {
      localStorage.setItem('admin_token', t);
      return t;
    }
    const stored = localStorage.getItem('admin_token') || '';
    document.getElementById('token-input').value = stored;
    return stored;
  }

  async function fetchJson(path) {
    const token = getToken();
    const res = await fetch(path, { headers: token ? { 'X-Admin-Token': token } : {} });
    if (res.status === 401) {
      localStorage.removeItem('admin_token');
      throw new Error('Falscher Admin-Token. Bitte eingeben.');
    }
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    }
    return await res.json();
  }

  function fmtTime(iso) {
    if (!iso) return '–';
    const d = new Date(iso);
    return d.toLocaleString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
  }

  function shortText(s, n = 40) {
    if (!s) return '–';
    return s.length > n ? s.slice(0, n) + '…' : s;
  }

  const WAITLIST_SOURCES = new Set(['premium-waitlist']);
  const TEASER_SOURCES = new Set(['quiz', 'landing', 'landing_direct', 'hero_direct']);

  let currentFilter = 'all';
  let lastLeads = [];

  function setFilter(name) {
    currentFilter = name;
    ['all', 'report', 'waitlist'].forEach(n => {
      const el = document.getElementById('flt-' + n);
      if (!el) return;
      if (n === name) {
        el.classList.add('bg-[#1e3352]', 'text-white', 'border-[#1e3352]');
        el.classList.remove('bg-white', 'text-gray-900');
      } else {
        el.classList.remove('bg-[#1e3352]', 'text-white', 'border-[#1e3352]');
        el.classList.add('bg-white');
      }
    });
    renderLeadsTable();
  }

  function renderLeadsTable() {
    const filtered = lastLeads.filter(l => {
      if (currentFilter === 'waitlist') return WAITLIST_SOURCES.has(l.source);
      if (currentFilter === 'report') return !WAITLIST_SOURCES.has(l.source);
      return true;
    });
    if (filtered.length === 0) {
      document.getElementById('leads-empty').classList.remove('hidden');
      document.getElementById('leads-body').innerHTML = '';
      return;
    }
    document.getElementById('leads-empty').classList.add('hidden');
    document.getElementById('leads-body').innerHTML = filtered.map(l => {
      const q = l.quiz_answers || {};
      const fullName = [l.first_name, l.last_name].filter(Boolean).join(' ') || '<span class="text-gray-300">—</span>';
      const streetLine = [l.street, l.house_number].filter(Boolean).join(' ');
      const cityLine = (q.address || '').replace(streetLine, '').replace(/^,\s*/, '').trim();
      const address = [streetLine, cityLine].filter(Boolean).join(', ') || q.address || shortText(q.source_page || '', 30);
      const isWaitlist = WAITLIST_SOURCES.has(l.source);
      const isTeaser = TEASER_SOURCES.has(l.source) || l.source === 'quiz';
      let typeBadge;
      if (isWaitlist) {
        typeBadge = '<span class="pill pill-purple">WARTELISTE</span>';
      } else if (l.source === 'paid') {
        typeBadge = '<span class="pill pill-voll">VOLL</span>';
      } else if (isTeaser) {
        typeBadge = '<span class="pill pill-teaser">TEASER</span>';
      } else {
        typeBadge = '<span class="pill pill-gray">—</span>';
      }
      return `<tr class="hover:bg-gray-50">
        <td class="px-3 py-2 text-xs text-gray-500 font-mono">${fmtTime(l.created_at)}</td>
        <td class="px-3 py-2 text-xs">${escapeHtml(fullName)}</td>
        <td class="px-3 py-2 font-medium">${escapeHtml(l.email)}</td>
        <td class="px-3 py-2 text-xs">${escapeHtml(shortText(address, 40))}</td>
        <td class="px-3 py-2"><span class="pill pill-gray">${escapeHtml(l.source)}</span></td>
        <td class="px-3 py-2">${typeBadge}</td>
        <td class="px-3 py-2 text-xs">${escapeHtml(shortText(q.nutzung || '', 25))}</td>
        <td class="px-3 py-2 text-xs">${escapeHtml(shortText(q.bedenken || '', 25))}</td>
        <td class="px-3 py-2 text-xs">${escapeHtml(shortText(q.dringlichkeit || '', 25))}</td>
      </tr>`;
    }).join('');
  }

  function escapeHtml(s) {
    if (s == null) return '';
    if (s.startsWith && s.startsWith('<span')) return s;  // already-safe HTML
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }

  async function refresh() {
    document.getElementById('last-refresh').textContent = 'Lade…';
    try {
      const stats = await fetchJson('/api/_admin/stats');
      const leadsData = await fetchJson('/api/_admin/leads?limit=100');

      // KPIs
      document.getElementById('kpi-leads-total').textContent = stats.leads.total;
      document.getElementById('kpi-leads-today').textContent = stats.leads.today;
      document.getElementById('kpi-leads-week').textContent = stats.leads.week;
      document.getElementById('kpi-reports-total').textContent = stats.reports.total ?? '0';

      // Waitlist KPI (sum across waitlist-tagged sources)
      const sources = stats.leads.by_source || {};
      const waitlistTotal = Object.entries(sources)
        .filter(([src]) => WAITLIST_SOURCES.has(src))
        .reduce((sum, [, n]) => sum + n, 0);
      document.getElementById('kpi-waitlist').textContent = waitlistTotal;

      // Sources pills — waitlist sources rendered purple
      const srcHtml = Object.entries(sources).length === 0
        ? '<span class="text-gray-400 text-sm">Noch keine Leads</span>'
        : Object.entries(sources).map(([src, n]) => {
            const cls = WAITLIST_SOURCES.has(src) ? 'pill-purple' : 'pill-blue';
            return `<div class="pill ${cls}">${src}: <strong>${n}</strong></div>`;
          }).join('');
      document.getElementById('sources').innerHTML = srcHtml;

      lastLeads = leadsData.leads || [];
      renderLeadsTable();

      document.getElementById('last-refresh').textContent =
        'Letzte Aktualisierung: ' + new Date().toLocaleTimeString('de-DE');
    } catch (err) {
      document.getElementById('last-refresh').textContent = 'Fehler: ' + err.message;
    }
  }

  async function downloadCSV() {
    try {
      const data = await fetchJson('/api/_admin/leads?limit=10000');
      const leads = data.leads || [];
      if (leads.length === 0) {
        alert('Keine Leads zum Exportieren');
        return;
      }
      const header = [
        'created_at', 'email', 'first_name', 'last_name',
        'street', 'house_number', 'city',
        'source', 'type', 'nutzung', 'bedenken', 'historie', 'dringlichkeit'
      ];
      const rows = leads.map(l => {
        const q = l.quiz_answers || {};
        const streetLine = [l.street, l.house_number].filter(Boolean).join(' ');
        const city = (q.address || '').replace(streetLine, '').replace(/^,\s*/, '').trim();
        const type = WAITLIST_SOURCES.has(l.source)
          ? 'waitlist'
          : (l.source === 'paid' ? 'paid' : 'teaser');
        return [
          l.created_at,
          l.email,
          l.first_name || '',
          l.last_name || '',
          l.street || '',
          l.house_number || '',
          city,
          l.source,
          type,
          q.nutzung || '',
          q.bedenken || '',
          q.historie || '',
          q.dringlichkeit || ''
        ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(',');
      });
      const csv = [header.join(','), ...rows].join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `bodenbericht-leads-${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    } catch (err) {
      alert('CSV Export fehlgeschlagen: ' + err.message);
    }
  }

  // Auto-refresh every 30s
  setFilter('all');
  refresh();
  setInterval(refresh, 30000);
</script>

</body>
</html>
