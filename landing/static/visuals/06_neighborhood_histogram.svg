<svg xmlns="http://www.w3.org/2000/svg"
     width="680" height="280" viewBox="0 0 680 280"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>GeoForensic Nachbarschafts-Vergleich</title>
  <desc>Velocity-Verteilung im 500 m-Radius · Adresse -0.5 mm/J</desc>

  <text x="40" y="35" font-size="14" font-weight="500" fill="#2C2C2A">Wo steht Ihr Grundstück in der Umgebung?</text>
  <text x="40" y="53" font-size="12" fill="#5F5E5A">Velocity-Verteilung aller PSI-Punkte im 500 m-Radius</text>

  <line x1="60"
        y1="220"
        x2="640"
        y2="220"
        stroke="#888780" stroke-width="0.5"/>

  <rect x="235.0" y="184.5"
