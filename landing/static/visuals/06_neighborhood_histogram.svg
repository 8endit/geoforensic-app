  <rect x="351.0" y="196.4"
        width="56.0" height="23.6"
        fill="#1D9E75"/>

  <line x1="321.0" y1="80"
        x2="321.0" y2="225"
        stroke="#185FA5" stroke-width="2"
        stroke-dasharray="4 3"/>  <rect x="258.5" y="65"
        width="125" height="22" rx="4"
        fill="#185FA5"/>
  <text x="321.0" y="80"
        text-anchor="middle" font-size="14" font-weight="500" fill="#FFFFFF">
    Ihr Grundstück
  </text>

  <text x="60.0"
        y="240"
        text-anchor="middle" font-size="12" fill="#5F5E5A">−5</text>
  <text x="205.0"
        y="240"
