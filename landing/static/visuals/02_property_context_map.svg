<svg xmlns="http://www.w3.org/2000/svg" width="680" height="480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <desc>Demo-Vorschau: Pin + Lock-Pille statt PSI-Punkten — Detail nach Bezahlung sichtbar.</desc>
  <title>Ihre Adresse mit Lock-Pille (Vollbericht-Vorschau)</title>

  <text x="40" y="35" fill="#2C2C2A" font-size="14" font-weight="500">Ihr Grundstück und seine Umgebung</text>
  <text x="40" y="53" fill="#5F5E5A" font-size="12">EGMS-Messpunkte im 500 m-Radius · Detail im Vollbericht</text>

  <defs>
    <pattern id="streetGrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <rect width="48" height="48" fill="#F1EFE8"/>
      <path d="M 0 24 L 48 24 M 24 0 L 24 48" stroke="#D8D4C7" stroke-width="0.5"/>
      <path d="M 0 0 L 48 48 M 0 48 L 48 0" stroke="#E5E1D5" stroke-width="0.4" stroke-dasharray="2 4"/>
    </pattern>
    <linearGradient id="parkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D7E4CB"/>
      <stop offset="100%" stop-color="#C2D6B0"/>
    </linearGradient>
    <filter id="mapBlur" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <g filter="url(#mapBlur)" opacity="0.85">
    <rect x="40" y="80" width="600" height="320" fill="url(#streetGrid)" rx="4"/>
    <ellipse cx="180" cy="320" rx="90" ry="55" fill="url(#parkGrad)" opacity="0.7"/>
    <path d="M 70 100 L 610 380" stroke="#C9C4B5" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M 70 100 L 610 380" stroke="#FFFFFF" stroke-width="0.5" stroke-dasharray="6 8" fill="none"/>
    <path d="M 100 380 L 580 110" stroke="#C9C4B5" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <g fill="#E5DEC9" stroke="#C9C4B5" stroke-width="0.4">
      <rect x="120" y="130" width="60" height="40" rx="2"/>
      <rect x="200" y="115" width="50" height="55" rx="2"/>
      <rect x="270" y="135" width="80" height="35" rx="2"/>
      <rect x="380" y="120" width="55" height="50" rx="2"/>
      <rect x="460" y="135" width="70" height="40" rx="2"/>
      <rect x="120" y="220" width="70" height="45" rx="2"/>
      <rect x="290" y="230" width="65" height="40" rx="2"/>
      <rect x="380" y="225" width="80" height="50" rx="2"/>
      <rect x="490" y="240" width="60" height="40" rx="2"/>
      <rect x="380" y="310" width="55" height="45" rx="2"/>
      <rect x="460" y="320" width="80" height="45" rx="2"/>
    </g>
  </g>

  <g transform="translate(340, 240)">
    <ellipse cx="0" cy="38" rx="10" ry="3" fill="#000" opacity="0.18"/>
    <path d="M 0 -36 C -14 -36 -22 -27 -22 -16 C -22 -3 -10 8 0 36 C 10 8 22 -3 22 -16 C 22 -27 14 -36 0 -36 Z"
          fill="#16a34a" stroke="#FFFFFF" stroke-width="2.5"/>
    <circle cx="0" cy="-16" r="6" fill="#FFFFFF"/>
  </g>

  <g transform="translate(340, 130)">
    <rect x="-105" y="-22" width="210" height="44" rx="22"
          fill="#0c1d3a" fill-opacity="0.92" stroke="#16a34a" stroke-width="1.5"/>
    <g transform="translate(-78, 0)" stroke="#16a34a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -7 -4 L -7 -8 A 7 7 0 0 1 7 -8 L 7 -4"/>
      <rect x="-9" y="-4" width="18" height="14" rx="1.5" fill="#16a34a" stroke="none"/>
      <rect x="-1" y="0" width="2" height="6" fill="#0c1d3a"/>
    </g>
    <text x="-50" y="5" fill="#FFFFFF" font-size="13" font-weight="600">Vollbericht freischalten</text>
  </g>

  <text x="340" y="430" text-anchor="middle" fill="#5F5E5A" font-size="11">
    Demo-Vorschau · Im Vollbericht: alle EGMS-Punkte mit Velocity, Distanz zum Haus, Trend pro Punkt.
  </text>

  <text x="40" y="466" fill="#888780" font-size="10">
    Quelle: © OpenStreetMap-contributors · Copernicus EGMS L3
  </text>
</svg>
